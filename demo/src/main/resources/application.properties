# Server Configuration
server.port=8080

# Active Spring Application Name
spring.application.name=institutionalprovisioning

# ==========================================
# DATABASE CONFIGURATION
# ==========================================

# 1. H2 Database (Default - Ready to run out-of-the-box)
spring.datasource.url=jdbc:h2:mem:trafficdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# 2. PostgreSQL Configuration (Comment out H2 above and uncomment this to use PostgreSQL)
# spring.datasource.url=jdbc:postgresql://localhost:5432/trafficdb
# spring.datasource.username=postgres
# spring.datasource.password=yourpassword
# spring.jpa.hibernate.ddl-auto=update
# spring.jpa.show-sql=true

# 3. MySQL Configuration (Comment out H2 above and uncomment this to use MySQL)
# spring.datasource.url=jdbc:mysql://localhost:3006/trafficdb?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
# spring.datasource.username=root
# spring.datasource.password=yourpassword
# spring.jpa.hibernate.ddl-auto=update
# spring.jpa.show-sql=true

